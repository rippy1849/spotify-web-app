<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ARTIST SEARCH // RAVE FM</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Share Tech Mono', monospace; min-height: 100vh; background: #000; color: #fff; padding: 40px 20px; }
        .scanlines { pointer-events: none; position: fixed; inset: 0; background: repeating-linear-gradient(to bottom, transparent 0px, transparent 3px, rgba(0,0,0,0.12) 3px, rgba(0,0,0,0.12) 4px); z-index: 10; }
        .bg { position: fixed; inset: 0; background: radial-gradient(ellipse at 20% 50%, #2d003a55 0%, transparent 60%), radial-gradient(ellipse at 80% 50%, #003a2d55 0%, transparent 60%), #000; animation: bgshift 6s ease-in-out infinite alternate; z-index: 0; }
        @keyframes bgshift { from { filter: hue-rotate(0deg); } to { filter: hue-rotate(180deg); } }
        .content { position: relative; z-index: 5; max-width: 700px; margin: 0 auto; }
        h1 { font-family: 'Orbitron', sans-serif; font-size: 2.5rem; font-weight: 900; background: linear-gradient(90deg, #ff00ff, #00ffff, #ffff00, #ff00ff); background-size: 300% 100%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; animation: rainbowShift 4s linear infinite; filter: drop-shadow(0 0 12px #ff00ff); letter-spacing: 4px; margin-bottom: 8px; }
        @keyframes rainbowShift { 0% { background-position: 0% 50%; } 100% { background-position: 300% 50%; } }
        .subtitle { color: #00ffff; text-shadow: 0 0 8px #00ffff; letter-spacing: 4px; font-size: 0.75rem; margin-bottom: 40px; }
        .nav { display: flex; gap: 24px; margin-bottom: 32px; flex-wrap: wrap; }
        .nav a { color: #ff00aa; text-decoration: none; font-size: 0.75rem; letter-spacing: 2px; text-shadow: 0 0 8px #ff00aa; }
        .nav a:hover { color: #fff; }

        .search-wrap {
            margin-bottom: 32px;
        }

        .search-input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid #ff00ff44;
            border-radius: 4px;
            padding: 14px 20px;
            color: #fff;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9rem;
            letter-spacing: 2px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .search-input:focus {
            border-color: #ff00ff;
            box-shadow: 0 0 20px #ff00ff44;
        }

        .search-input::placeholder { color: #555; }

        .artist-list { }

        .artist-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid #ffffff08;
            text-decoration: none;
            transition: background 0.15s;
            border-radius: 4px;
        }

        .artist-row:hover { background: rgba(255,0,255,0.06); }

        .artist-row .ar-name {
            font-size: 0.85rem;
            color: #fff;
            letter-spacing: 1px;
        }

        .artist-row .ar-plays {
            font-size: 0.65rem;
            color: #ff00aa;
            letter-spacing: 2px;
        }

        .count-label {
            font-size: 0.65rem;
            color: #555;
            letter-spacing: 2px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="scanlines"></div>
    <div class="content">
        <div class="nav">
            <a href="/">⌂ HOME</a>
            <a href="/stats">◈ STATS</a>
            <a href="/logout">⏏ LOGOUT</a>
        </div>

        <h1>ARTISTS</h1>
        <p class="subtitle">◈ {{ count }} IN YOUR HISTORY ◈</p>

        <div class="search-wrap">
            <input type="text" class="search-input" id="searchInput"
                   placeholder="SEARCH ARTISTS..." autocomplete="off">
        </div>

        <div class="count-label" id="countLabel">SHOWING ALL {{ count }} ARTISTS</div>

        <div class="artist-list" id="artistList"></div>
    </div>

    <script>
        const artists = {{ artists | safe }};
        const list    = document.getElementById('artistList');
        const label   = document.getElementById('countLabel');

        function render(filtered) {
            list.innerHTML = '';
            label.textContent = `SHOWING ${filtered.length} OF ${artists.length} ARTISTS`;
            filtered.forEach(a => {
                const row     = document.createElement('a');
                row.className = 'artist-row';
                row.href      = `/artist/${encodeURIComponent(a.name)}`;
                row.innerHTML = `
                    <span class="ar-name">${a.name}</span>
                    <span class="ar-plays">${a.plays} plays</span>
                `;
                list.appendChild(row);
            });
        }

        render(artists);

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const q        = e.target.value.trim().toLowerCase();
            const filtered = q
                ? artists.filter(a => a.name.toLowerCase().includes(q))
                : artists;
            render(filtered);
        });
    </script>
</body>
</html>
