<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CALENDAR // RAVE FM</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Share Tech Mono', monospace; min-height: 100vh; background: #000; color: #fff; padding: 40px 20px; }
        .scanlines { pointer-events: none; position: fixed; inset: 0; background: repeating-linear-gradient(to bottom, transparent 0px, transparent 3px, rgba(0,0,0,0.12) 3px, rgba(0,0,0,0.12) 4px); z-index: 10; }
        .bg { position: fixed; inset: 0; background: radial-gradient(ellipse at 20% 50%, #2d003a55 0%, transparent 60%), radial-gradient(ellipse at 80% 50%, #003a2d55 0%, transparent 60%), #000; animation: bgshift 6s ease-in-out infinite alternate; z-index: 0; }
        @keyframes bgshift { from { filter: hue-rotate(0deg); } to { filter: hue-rotate(180deg); } }
        .content { position: relative; z-index: 5; max-width: 1100px; margin: 0 auto; }
        h1 { font-family: 'Orbitron', sans-serif; font-size: 2.5rem; font-weight: 900; background: linear-gradient(90deg, #ff00ff, #00ffff, #ffff00, #ff00ff); background-size: 300% 100%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; animation: rainbowShift 4s linear infinite; filter: drop-shadow(0 0 12px #ff00ff); letter-spacing: 4px; margin-bottom: 8px; }
        @keyframes rainbowShift { 0% { background-position: 0% 50%; } 100% { background-position: 300% 50%; } }
        .subtitle { color: #00ffff; text-shadow: 0 0 8px #00ffff; letter-spacing: 4px; font-size: 0.75rem; margin-bottom: 40px; }
        .nav { display: flex; gap: 24px; margin-bottom: 32px; flex-wrap: wrap; }
        .nav a { color: #ff00aa; text-decoration: none; font-size: 0.75rem; letter-spacing: 2px; text-shadow: 0 0 8px #ff00aa; }
        .nav a:hover { color: #fff; }
        h2 { font-family: 'Orbitron', sans-serif; font-size: 0.85rem; letter-spacing: 4px; color: #ffff00; text-shadow: 0 0 10px #ffff0088; margin-bottom: 16px; border-bottom: 1px solid #ffff0033; padding-bottom: 8px; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 40px; }
        .stat-card { background: rgba(255,255,255,0.03); border: 1px solid #ff00ff44; border-radius: 10px; padding: 20px; text-align: center; }
        .stat-value { font-family: 'Orbitron', sans-serif; font-size: 1.6rem; font-weight: 900; color: #00ffff; text-shadow: 0 0 16px #00ffff; }
        .stat-label { font-size: 0.62rem; letter-spacing: 2px; color: #ff00aa; margin-top: 6px; }

        .calendar-wrap {
            background: rgba(255,255,255,0.02);
            border: 1px solid #ff00ff22;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 40px;
            overflow-x: auto;
        }

        .calendar-grid {
            display: grid;
            grid-template-rows: repeat(7, 14px);
            grid-auto-flow: column;
            gap: 3px;
            width: max-content;
        }

        .cal-cell {
            width: 14px;
            height: 14px;
            border-radius: 2px;
            cursor: pointer;
            transition: transform 0.1s;
            position: relative;
        }

        .cal-cell:hover { transform: scale(1.4); z-index: 10; }

        .cal-cell.empty { background: transparent; cursor: default; }

        .month-labels {
            display: flex;
            gap: 0;
            margin-bottom: 6px;
            width: max-content;
            padding-left: 20px;
        }

        .month-label {
            font-size: 0.65rem;
            color: #ff00aa;
            letter-spacing: 1px;
            min-width: 52px;
        }

        .dow-labels {
            display: grid;
            grid-template-rows: repeat(7, 14px);
            gap: 3px;
            float: left;
            margin-right: 6px;
            margin-top: 2px;
        }

        .dow-label {
            font-size: 0.6rem;
            color: #555;
            height: 14px;
            line-height: 14px;
        }

        .tooltip {
            position: fixed;
            background: #111;
            border: 1px solid #ff00ff;
            border-radius: 6px;
            padding: 10px 14px;
            font-size: 0.72rem;
            color: #fff;
            pointer-events: none;
            display: none;
            z-index: 100;
            box-shadow: 0 0 16px #ff00ff44;
        }

        .tooltip .t-date  { color: #ffff00; margin-bottom: 4px; font-family: 'Orbitron', sans-serif; font-size: 0.75rem; }
        .tooltip .t-plays { color: #00ffff; }
        .tooltip .t-mins  { color: #ff00aa; }
        .tooltip .t-skips { color: #ff6600; }

        .legend {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 16px;
            font-size: 0.7rem;
            color: #555;
        }

        .legend-cell {
            width: 14px;
            height: 14px;
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="scanlines"></div>
    <div class="content">
        <div class="nav">
            <a href="/">⌂ HOME</a>
            <a href="/now-playing">▶ NOW PLAYING</a>
            <a href="/stats">◈ STATS</a>
            <a href="/logout">⏏ LOGOUT</a>
        </div>

        <h1>CALENDAR</h1>
        <p class="subtitle">◈ 365 DAYS OF LISTENING ◈</p>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value">{{ active_days }}</div>
                <div class="stat-label">ACTIVE DAYS</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">{{ total_plays }}</div>
                <div class="stat-label">TOTAL PLAYS</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">{{ total_minutes }}m</div>
                <div class="stat-label">MINUTES LISTENED</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">{{ best_day.date }}</div>
                <div class="stat-label">BEST DAY ({{ best_day.plays }} PLAYS)</div>
            </div>
        </div>

        <div class="section">
            <h2>📅 LISTENING HEATMAP</h2>
            <div class="calendar-wrap">
                <div class="month-labels" id="monthLabels"></div>
                <div style="display:flex;">
                    <div class="dow-labels">
                        <div class="dow-label">MON</div>
                        <div class="dow-label"></div>
                        <div class="dow-label">WED</div>
                        <div class="dow-label"></div>
                        <div class="dow-label">FRI</div>
                        <div class="dow-label"></div>
                        <div class="dow-label">SUN</div>
                    </div>
                    <div class="calendar-grid" id="calGrid"></div>
                </div>
                <div class="legend">
                    <span>LESS</span>
                    <div class="legend-cell" style="background:#ffffff11;"></div>
                    <div class="legend-cell" style="background:#ff00ff44;"></div>
                    <div class="legend-cell" style="background:#ff00ff88;"></div>
                    <div class="legend-cell" style="background:#ff00ffcc;"></div>
                    <div class="legend-cell" style="background:#ff00ff;"></div>
                    <span>MORE</span>
                </div>
            </div>
        </div>
    </div>

    <div class="tooltip" id="tooltip">
        <div class="t-date" id="tt-date"></div>
        <div class="t-plays" id="tt-plays"></div>
        <div class="t-mins" id="tt-mins"></div>
        <div class="t-skips" id="tt-skips"></div>
    </div>

    <script>
        const dates   = {{ all_dates | tojson }};
        const maxPlays = {{ max_plays }};
        const grid     = document.getElementById('calGrid');
        const tooltip  = document.getElementById('tooltip');

        function getColor(plays) {
            if (plays === 0) return '#ffffff08';
            const intensity = plays / maxPlays;
            if (intensity < 0.25) return '#ff00ff33';
            if (intensity < 0.5)  return '#ff00ff66';
            if (intensity < 0.75) return '#ff00ffaa';
            return '#ff00ff';
        }

        // Find the day of week of the first date to pad the grid
        const firstDate = new Date(dates[0].date + 'T00:00:00');
        let   startDow  = firstDate.getDay(); // 0=Sun
        // Convert to Mon=0
        startDow = (startDow + 6) % 7;

        // Add empty cells for padding
        for (let i = 0; i < startDow; i++) {
            const empty = document.createElement('div');
            empty.className = 'cal-cell empty';
            grid.appendChild(empty);
        }

        // Track month label positions
        const monthPositions = {};

        dates.forEach((d, idx) => {
            const cell = document.createElement('div');
            cell.className = 'cal-cell';
            cell.style.background = getColor(d.plays);

            // Glow for high play days
            if (d.plays > maxPlays * 0.7) {
                cell.style.boxShadow = `0 0 6px #ff00ff`;
            }

            cell.addEventListener('mousemove', (e) => {
                document.getElementById('tt-date').textContent  = d.date;
                document.getElementById('tt-plays').textContent = `▶ ${d.plays} plays`;
                document.getElementById('tt-mins').textContent  = `⏱ ${d.minutes} minutes`;
                document.getElementById('tt-skips').textContent = `⏭ ${d.skips} skips`;
                tooltip.style.display = 'block';
                tooltip.style.left    = (e.clientX + 14) + 'px';
                tooltip.style.top     = (e.clientY - 10) + 'px';
            });

            cell.addEventListener('mouseleave', () => {
                tooltip.style.display = 'none';
            });

            grid.appendChild(cell);

            // Track month positions for labels
            if (d.day === 1 || idx === 0) {
                const col = Math.floor((idx + startDow) / 7);
                monthPositions[col] = d.month;
            }
        });

        // Build month labels
        const monthLabels = document.getElementById('monthLabels');
        const totalCols   = Math.ceil((dates.length + startDow) / 7);
        for (let col = 0; col < totalCols; col++) {
            const label = document.createElement('div');
            label.className = 'month-label';
            label.style.width = '17px';
            label.textContent = monthPositions[col] || '';
            monthLabels.appendChild(label);
        }
    </script>
</body>
</html>
